body:
  text: 少室山潜真子述詩曰一轉安排虎作頭先須深入水中修經旬用意除鉛汞火煉河車向甲求二轉安排聽一靈將來還向水中烹經陽鼎裏殷勤煉被著青衣嫁與庚三轉勤修在北方從兹一度合隂陽水蒸火爍七十二壬癸夫妻岀洞房四轉修來未十旬開鑪闢鼎若浮雲直須洗换衣鮮潔莫使塵埃有汚薰鉛汞修持經五轉三花馥馥若輕紅開鑪出水重添火又却安排入坎宫六轉綿綿逾五月庾夫甲婦正綢繆直教固濟須牢宻莫使鑪中有水流金水合時非一體虎龍交處一重形仙人留此神丹訣會取東西白與青一味靈砂屬四神鑪中一箇小乾坤參同契裏分明說神水華池幾處門由來志士煉丹砂此道先須識馬牙龍虎合時無異藥誰知黄帝美金華聖人垂意事朦朧鉛汞元來屬正東女却剛强男婭姹一時和合入中宮唯有靈砂理最深一陽須向水中尋莫焼世上堅頑藥必定無成損爾金西方姹女火中胎東極朱南水裏來唯有中宮堪混一不曽纎粟染塵埃至道凡人莫强知青龍誰見著青衣黄芽不向黑方了姹女終須逐火飛金液神方非一門華池要妙理難論君臣父子歸中土青魄經年嫁與魂鉛汞從來體一眞由來學士自迷昏憑君子細尋南北水火分形是藥根純隂纔盡却純陽土裏濳身水裏藏若共五行無計會如何得作薬中王凡流若欲煉金丹經訣先須認九還莫弄四黄并八石终身不得到三山初煉流珠變化砂將來鼎裏合金華凡徒不信長生術九轉功成切莫誇神丹見說極多方燕雀無由産鳯凰除却真鉛與真汞其餘皆不合宮商甲乙龍從離象岀庚辛虎自坎鄉生爲夫爲婦能相守不改當時性與情仙人留語讃黄芽金水同爲一鼎花只自變爲龍虎後坎離同入紫河車坎男離女未成時早被天公配二儀及到變爲夫婦後立名翻作聖無知家家罔象藏龍虎處處朦朧隱坎離自為從來迷不識聖人爭肯露希夷鑪中久煉見鉛精撲撲紅霜似粉輕百斛珠璣非價直即知霄漢是前程時時一粒碾爲塵火上徐徐摻水銀誰羨滿堂珠與玉脱凡即便作真人相逢道話謾云云那箇真中得正真徒配四黄并八石寧知白虎與龍親壬寅水裏抽庚虎戊已鑪中鎭甲龍頼得南方有無忌殷勤相守赤形容中男中女兩相逢二八年華理一同更有將軍爲紹介綢繆金是得金翁隂煉鉛精九轉终百年耆老却成童白虎這回休反北青龍從此不歸東庚辛為鼎火爲媒丙午純陽隱子胎歴歴綿綿三百日不知此道自何來紫煙真人解大丹頌世人何處認黄芽此物鉛中在我家鉛汞共成天地氣脫胎方見紫明砂二氣丹砂物最靈眞成正氣是黃精汞中有物鉛中取人自迷津落路行大道分明在目前時人不會悮歸泉黄芽便是乾坤氣性志根基似汞連合其大道合其源子母相逢不敢言先汞後鉛真大道莫交失伴鶴來軒此物皆從二八圎吉年吉月入鑪安千朝火候知時節莫遣芽乾汞不乾日月延人人自亡分明真道不能强家家盡有鉛兼汞何處迷津落草荒鉛汞居川不在山三田日夜好追攀往年縱却踈狂性漸漸尫羸作鬼顏大道空留兩卷經自然匹配作儀刑天生牝牡從前有何得他州問藥名用鉛須得汞相和二姓為親女唱歌鍊到紫河車動地白雲相伴鶴來過甲乙神驅造化圖青龍知是子鉛酥分明制出何難會却道仙家誑我徒青龍白虎合爲胎十月懷躭始滿開此是鉛芽真口訣世人何處覓三才姹女初生醉似泥千朝暗室不東西䖍心日夜勤加火莫遣隨時汞不齊芽在中宮汞在南尋常斟酌莫交貪還丹不是難求薬自是無機口不鉗滿市黄茅無所歸世人輕易作塵泥公卿盡讖真靈薬祗爲貪婪混著伊天地初分日月髙狀如雞子又如桃隂陽正氣知時節直待三年脱毋胞大道從來不負人分明鉛汞棄如塵世人只爲無分別二氣丹砂水火親此物又生人不知隂陽真氣兊居離坎居五色真名姓認得黄芽作聖歸分明運動自追尋茅在中宫不在心元氣若能爲大道須知大道莫沈吟莫道人心自不尋鉛芽日月在中宫北方姹女是靈藥得伴相隨去大蓬鉛汞傳來幾萬秋幾人識得幾人修若交俗姓知靈藥地上仙人似水流心園春解七返還丹在人先須煉巳待時七返功人難會返本還元七轉收歸兊陽九但行隂六位何慮三峯雪裏安然睡在人修須發志烹煉依時勿使心游外澄淨湛然無垢膩神水頻澆別有甘甜味正一陽初動中宵漏永一陽生當復卦子後披衣握固端然坐玄牝驅馳衝頂過一撞三關始覺工夫大木鉛漿金汞火水火之中有箇嬰兒卧漏永中宵星斗磨唯指天罡莫遣交差錯温温鉛鼎光透簾幃造化爭馳火初炎歸玉戶滿鼎温温遍體周天度水火抽添依大數盡到丹田須遣教燒住自然光非晝暮光射簾幃可照千千歩內飬還丹他自做造化功夫神聖如鍼炬虎龍交媾進火功夫猶𨶒危水生金隂魄遶火長青龍魂向肝中卯三七數中無太少相從相隨直到泥丸腦火頻添功夫妙解使長生顏貌常無老能闘邪魔并外道教我逍遥立得神仙號曲江上看月華澄淨有箇烏飛燦燦明天河曲蚌上光輝内長娑羅木卯兔千年毛似玉隂裏生陽只要人知悟日中烏生三足陽内藏隂本向離中住二物同收歸一處對景觀形輙莫生塵汚當時自飮刀圭又誰信無中養就兒正當時須自暁認得刀圭掌内宴㝠香勤飮瓊漿常是飽大藥頻修莫要虚抛了龍左行虎右遶無裏生兒迷者爭知道子午寂然功最好不會修持空說千千兆辯水源清濁木金間隔崑崙山出猛水一沠東流九曲濁連底下流不通無處止澄浄清清照見神光體金木因為妙㫖龍虎相交何假同元義只恐衆生難省會再舉隂陽切切生慚愧不因師指此事難知道要玄微坎離根鉛汞始看盡千章難取希夷理際會先生蒙妙㫖萬卷皆通別是心懽喜有中藏無内起大納乾坤小入亳毛裏元始曾言如黍米靈寳分明始覺真端的天機深逺下手速修無太遅地氣騰天兩降萬物生芽使是天機象山頂有泉深數丈索短求他要覓應難望少年修根脚壯老後鉛虚未少如何向視聽都休神散蕩本去乾枯怎得成无上蓬萊路仗三千行滿獨步雲歸海波間蓬萊島行滿功成去者絶希少無路無舟空浩渺鄜市先生要到應難到養冲和宜在早意氣男兒守取幽玄道滄海變移身未老玉帝知聞必有金書認何仙姑頌吕真人沁園春七返還丹反覆還丹最有功須憑南北與西東五行四象皆歸土還得根元性便通在人先須煉巳待時煉巳先須正待時丹成體内有玄微交媾徃來龍虎見丁公抱得黑龜兒正一陽初動中宵漏永漏永更長戰一陽須憑卦象入離鄉三三九九火符驗入腹靈丹心自涼溫溫鉛鼎光透簾幃温温鉛鼎入中源放入三宮養瑞蓮進就自然通聖理神光歩步照神仙造化爭馳龍虎交媾七還鑪鼎只憂遅丹藥燒成巳自知捉得乾坤真造化十二時中只一時進火功夫猶闘危進火功夫自有期鼎中丹藥雪花飛有人問我攻何業九曲江邊飮碧池曲江上看月華澄淨有箇鳥飛金鳥飛入碧潭中海底擒來木上龍奪得夜明珠一顆霞光五道照仙宮當時自飮刀圭刀圭入腹鬼神驚獨坐閑房滿室明不向隂司有鬼趣一心專待掛仙名又誰信無中養就兒自家飬就一嬰兒不寒不熱不曽飢再養一雙兒共女等閑不許别人知辯水源清濁木金間隔金木間隔在四邊中央識破五行金要了但尋宗與祖會得隂陽午後前不因師指此事難知長生須是拜師傳决得天機甚不難口口相傳不記字得遇明師宿有緣道要玄微天機深逺下手速修無太遲蓬莱路仗三千行滿獨歩雲歸還丹顯妙通幽集
