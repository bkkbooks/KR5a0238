front:
  text: 還丹顯妙通幽集序珠八凡以丹竈留心黄芽役慮不明鉛汞浪費珠珍或求百草之霜欲明制伏或合五礬之匱輙務變通徒消歳月之功莫達鉛汞之旨余自從弱冠常切親人才逾立年便逢至道既悟希夷之旨方知恍惚之間軒帝去而垂衣劉安昇而棄䑕事不虚傳迹唯昭驗故達者指余曰龍虎者金水也金水者鉛汞也鉛汞者隂陽也隂陽者坎離也坎離者夫婦也夫婦者男女也始自一源终分數號其寔同出而異名也吾切見世人向庚辛而求虎詣甲乙以尋龍殊不知龍在庚辛虎居甲乙火炎壬癸水居丙丁自古聖人不直書其事蓋爲此道至易也故謌曰龍從火裏出虎向水中生又曰龍不居東溟虎不在西虜又曰俄然木位化爲金便是大丹心此之謂也余今不期多幸獲究玄文敢罄菲材効元陽子金液集作顯妙通幽詩三十首以俟後來君子與余同志者印證耳還丹顯妙通幽集
  hash: sha256:da059ef8c5a82139e677eeb33c0280968f6aa72ccab9e21711ef55b607332327
